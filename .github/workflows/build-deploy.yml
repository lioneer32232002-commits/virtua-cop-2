name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      # unity-builder@v4 handles Personal license activation internally when
      # given UNITY_EMAIL + UNITY_PASSWORD — no separate activate / return-license
      # steps needed. (The old unity-activate@v2 errors with "License activation
      # strategy could not be determined" for Personal accounts using just creds.)
      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: WebGL
          buildName: VirtuaCop2

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `pages deploy` auto-creates the Pages project on first run, so the
          # user doesn't have to navigate the new unified Workers & Pages UI.
          command: pages deploy build/WebGL/VirtuaCop2 --project-name=virtua-cop-2 --branch=main --commit-dirty=true
