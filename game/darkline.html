<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><title>DARKLINE M1</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  #c{width:100vw;height:100vh}
  #crosshair{position:fixed;width:14px;height:14px;border:2px solid #f4e2b0;border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none;z-index:6;display:none}
  #hint{position:fixed;left:8px;top:8px;color:#9c9;font:12px monospace;z-index:5}
  /* 簡報/結尾＝電報風：電傳打字機等寬體 + 琥珀磷光 + 掃描線 + 淡入。 */
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;
    align-items:center;color:#e8c87a;font:16px/1.85 ui-monospace,'Courier New',Courier,monospace;
    letter-spacing:.06em;text-shadow:0 0 6px rgba(232,200,122,.4);
    background:rgba(6,7,10,.95);z-index:8;text-align:center;padding:0 12vw}
  #overlay h1{font-size:24px;letter-spacing:.32em;margin:0 0 18px;padding-bottom:12px;
    border-bottom:1px solid rgba(232,200,122,.35);text-shadow:0 0 10px rgba(232,200,122,.6)}
  #overlay p{white-space:pre-line;max-width:760px;margin:0}
  /* CRT/電傳掃描線紋理（不擋互動）。 */
  #overlay::after{content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.16) 2px 4px)}
  #overlay.hidden{display:none}
  #overlay.fade{animation:cardfade .6s ease}
  @keyframes cardfade{from{opacity:0}to{opacity:1}}
  /* HUD 掛載容器：全螢幕 overlay，子元素自有絕對定位；pointer-events:none 不擋瞄準。 */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:5}
  /* 選單：蓋在 overlay(8) 之上；boot 時先進選單，點開始才收掉進 briefing。 */
  #menu{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;
    align-items:center;gap:12px;color:#f4e2b0;font:16px/1.6 system-ui;
    background:rgba(8,8,12,.96);z-index:10}
  #menu.hidden{display:none}
  #menu .menu-title{font-size:32px;letter-spacing:.12em;margin:0 0 20px;text-align:center;padding:0 8vw}
  #menu .menu-btn{min-width:220px;padding:10px 18px;background:transparent;color:#f4e2b0;
    border:1px solid #f4e2b0;border-radius:2px;font:15px system-ui;letter-spacing:.08em;cursor:pointer}
  #menu .menu-btn:hover{background:#f4e2b0;color:#0a0a12}
  #menu .menu-btn.disabled,#menu .menu-btn:disabled{opacity:.35;cursor:default}
  #menu .menu-btn.disabled:hover,#menu .menu-btn:disabled:hover{background:transparent;color:#f4e2b0}
  #menu .menu-lang{display:flex;gap:10px;margin-top:20px}
  #menu .menu-lang .menu-btn{min-width:auto;padding:6px 16px;font-size:13px}
  #menu .menu-lang .menu-btn.active{background:#f4e2b0;color:#0a0a12}
  /* 情報解碼面板：自由段按 E 開；蓋在 overlay(8) 之下、HUD(5) 之上 → z=9。 */
  #decode{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;
    background:rgba(6,8,12,.86);z-index:9}
  #decode.hidden{display:none}
  #decode .decode-card{min-width:340px;max-width:90vw;padding:22px 26px;background:#0c0e14;
    border:1px solid #6ad0ff;border-radius:3px;color:#cfe7f2;font:14px/1.7 'Courier New',monospace;
    box-shadow:0 0 24px rgba(106,208,255,.25)}
  #decode .decode-title{margin:0 0 14px;color:#6ad0ff;font-size:18px;letter-spacing:.14em}
  #decode .decode-cipher{letter-spacing:.18em;color:#9fb6c2;word-break:break-all}
  #decode .decode-crib{margin:6px 0 16px;color:#f4e2b0;font-size:13px}
  #decode .decode-dial{display:flex;align-items:center;gap:14px;margin:6px 0}
  #decode .decode-shift{min-width:48px;text-align:center;color:#f4e2b0;font-size:16px}
  #decode .decode-preview{margin:14px 0 4px;padding:10px 12px;background:#05070b;border:1px dashed #2a3a44;
    letter-spacing:.22em;font-size:16px;color:#cfe7f2;word-break:break-all}
  #decode .decode-preview.ok{color:#7dff9b;border-color:#7dff9b;border-style:solid}
  #decode .decode-hint{margin-top:8px;color:#6f8794;font-size:12px}
  #decode .decode-status{margin-top:10px;color:#7dff9b;min-height:1.2em}
  #decode .decode-btn{padding:6px 14px;background:transparent;color:#6ad0ff;border:1px solid #6ad0ff;
    border-radius:2px;font:14px 'Courier New',monospace;cursor:pointer}
  #decode .decode-btn:hover{background:#6ad0ff;color:#06080c}
  #decode .decode-close{margin-top:16px}
</style></head>
<body>
<div id="c"></div>
<div id="crosshair"></div>
<div id="hud"></div>
<div id="hint">DARKLINE M1</div>
<div id="overlay"><h1></h1><p></p></div>
<div id="decode" class="hidden"></div>
<div id="menu" class="hidden"></div>
<script type="module" src="/src/darkline/darkline.js"></script>
</body></html>
