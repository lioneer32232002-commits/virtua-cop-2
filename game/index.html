<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtua Cop 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: none; }
    #canvas-container { width: 100vw; height: 100vh; }
    #canvas-container canvas { display: block; }
    #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #crosshair {
      position: fixed;
      width: 72px; height: 72px;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
    /* Tick marks at N/S/E/W — not a full cross, just stubs like original */
    #crosshair::before {
      content: '';
      position: absolute;
      width: 2px; height: 18px;
      background: rgba(255,220,0,0.95);
      left: 50%; top: 0;
      transform: translateX(-50%);
      box-shadow: 0 54px 0 rgba(255,220,0,0.95); /* bottom tick via shadow */
    }
    #crosshair::after {
      content: '';
      position: absolute;
      width: 18px; height: 2px;
      background: rgba(255,220,0,0.95);
      top: 50%; left: 0;
      transform: translateY(-50%);
      box-shadow: 54px 0 0 rgba(255,220,0,0.95); /* right tick via shadow */
    }
    #crosshair .ring {
      position: absolute; inset: 6px;
      border: 2.5px solid rgba(255,220,0,0.9);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="hud"></div>
  <div id="crosshair"><div class="ring"></div></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
