<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><title>DARKLINE M0 spike</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
#c{width:100vw;height:100vh}
#hint{position:fixed;left:8px;top:8px;color:#9c9;font:12px monospace;z-index:5;text-shadow:0 1px 2px #000}
#hud{position:fixed;right:10px;top:8px;color:#dde;font:14px monospace;z-index:5;text-align:right;text-shadow:0 1px 2px #000}
#crosshair{position:fixed;left:50%;top:50%;width:6px;height:6px;margin:-3px 0 0 -3px;border-radius:50%;background:#fff;opacity:.85;z-index:5;pointer-events:none;display:none}
#banner{position:fixed;inset:0;display:none;align-items:center;justify-content:center;white-space:pre-line;text-align:center;color:#fff;font:bold 40px system-ui,sans-serif;text-shadow:0 2px 10px #000;z-index:6;pointer-events:none}
</style></head>
<body>
<div id="c"></div>
<div id="hint"></div>
<div id="hud"></div>
<div id="crosshair"></div>
<div id="banner"></div>
<script type="module" src="/src/darkline/m0/spike.js"></script>
</body></html>
